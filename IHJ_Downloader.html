<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I HATE JUICE DOWNLOADER</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap');

  :root {
    --bg-dark: #0a1a0e;
    --bg-mid: #0d2213;
    --bg-panel: #0f2915;
    --green-deep: #1a4a20;
    --green-mid: #2a7a33;
    --green-bright: #3dba4a;
    --green-neon: #4eff5e;
    --red-sign: #d42020;
    --red-dark: #8b0000;
    --accent-orange: #ff6b35;
    --text-primary: #e8ffe9;
    --text-dim: #7aad80;
    --border: #1e5526;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--bg-dark);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(61,186,74,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(61,186,74,0.04) 1px, transparent 1px);
    background-size: 32px 32px;
  }

  .bg-glow {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(26,74,32,0.55) 0%, transparent 80%);
  }

  .no-juice-bg {
    position: fixed;
    right: -60px; bottom: -60px;
    width: 420px; height: 420px;
    z-index: 0;
    opacity: 0.07;
    animation: spin-slow 40s linear infinite;
  }

  .no-juice-bg2 {
    position: fixed;
    left: -80px; top: -60px;
    width: 300px; height: 300px;
    z-index: 0;
    opacity: 0.05;
    animation: spin-slow 55s linear infinite reverse;
  }

  @keyframes spin-slow {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .window {
    position: relative; z-index: 10;
    width: 660px;
    background: linear-gradient(160deg, #0f2915 0%, #0a1a0e 100%);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    box-shadow:
      0 0 0 1px rgba(61,186,74,0.08),
      0 8px 60px rgba(0,0,0,0.8),
      0 0 80px rgba(26,74,32,0.3),
      inset 0 1px 0 rgba(61,186,74,0.12);
    overflow: hidden;
    margin: 10px; /* Mobil qurilmalarda chekkalarga yopishib qolmasligi uchun */
  }

  .titlebar {
    background: linear-gradient(90deg, #0a1a0e 0%, #0f2915 50%, #0a1a0e 100%);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    user-select: none;
  }

  .titlebar-dots { display: flex; gap: 7px; align-items: center; }
  .dot {
    width: 12px; height: 12px; border-radius: 50%;
    cursor: pointer; transition: filter 0.2s;
  }
  .dot:hover { filter: brightness(1.4); }
  .dot-red   { background: #ff5f57; border: 1px solid #e0443e; }
  .dot-yellow{ background: #febc2e; border: 1px solid #d4a012; }
  .dot-green { background: #28c840; border: 1px solid #1aaa2e; }

  .titlebar-name {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    position: absolute; left: 50%; transform: translateX(-50%);
  }

  .titlebar-status {
    display: flex; align-items: center; gap: 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; color: var(--green-bright);
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green-neon);
    box-shadow: 0 0 6px var(--green-neon);
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .header {
    padding: 24px 36px 16px;
    display: flex; align-items: center; gap: 20px;
    border-bottom: 1px solid rgba(30,85,38,0.5);
    position: relative;
  }

  .logo-sign {
    flex-shrink: 0;
    width: 64px; height: 64px;
    animation: pulse-sign 3s ease-in-out infinite;
  }
  @keyframes pulse-sign {
    0%,100%{ filter: drop-shadow(0 0 8px rgba(212,32,32,0.5)); }
    50%    { filter: drop-shadow(0 0 18px rgba(212,32,32,0.9)); }
  }

  .header-text { flex: 1; }
  .header-main {
    font-family: 'Bebas Neue', cursive;
    font-size: 34px;
    line-height: 1;
    color: var(--text-primary);
    letter-spacing: 3px;
    text-shadow: 0 0 30px rgba(61,186,74,0.3);
  }
  .header-main .hate { color: var(--red-sign); }
  .header-main .juice { color: #e8660a; text-decoration: line-through; text-decoration-color: var(--red-sign); }
  .header-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 4px;
    margin-top: 4px;
  }

  .version-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; color: var(--green-bright);
    background: rgba(61,186,74,0.1);
    border: 1px solid rgba(61,186,74,0.25);
    border-radius: 3px; padding: 2px 7px;
    letter-spacing: 1px; align-self: flex-start; margin-top: 4px;
  }

  .body { padding: 24px 36px 28px; display: flex; flex-direction: column; gap: 20px; }

  .field-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; color: var(--text-dim);
    letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px;
  }

  .url-row { display: flex; gap: 10px; align-items: stretch; }

  .url-input {
    flex: 1;
    background: rgba(0,0,0,0.45);
    border: 1.5px solid var(--border);
    border-radius: 7px;
    padding: 12px 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px; color: var(--text-primary);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .url-input::placeholder { color: #3a5e3f; }
  .url-input:focus {
    border-color: var(--green-mid);
    box-shadow: 0 0 0 3px rgba(42,122,51,0.15), inset 0 0 20px rgba(61,186,74,0.04);
  }

  .paste-btn {
    background: rgba(61,186,74,0.1);
    border: 1.5px solid rgba(61,186,74,0.25);
    border-radius: 7px; padding: 12px 16px;
    color: var(--green-bright); font-size: 18px; cursor: pointer;
    transition: all 0.15s; display: flex; align-items: center;
  }
  .paste-btn:hover {
    background: rgba(61,186,74,0.2);
    border-color: var(--green-bright);
    box-shadow: 0 0 12px rgba(61,186,74,0.2);
  }
  .paste-btn:active { transform: scale(0.95); }

  .format-row { display: flex; gap: 10px; }

  .fmt-btn {
    flex: 1;
    background: rgba(0,0,0,0.35);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 14px 10px;
    cursor: pointer; text-align: center; transition: all 0.2s;
    position: relative; overflow: hidden;
  }
  .fmt-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(61,186,74,0.08) 0%, transparent 100%);
    opacity: 0; transition: opacity 0.2s;
  }
  .fmt-btn:hover::before { opacity: 1; }
  .fmt-btn:hover { border-color: var(--green-mid); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
  .fmt-btn.active {
    border-color: var(--green-bright);
    background: rgba(61,186,74,0.12);
    box-shadow: 0 0 20px rgba(61,186,74,0.2), inset 0 0 20px rgba(61,186,74,0.05);
  }
  .fmt-btn.active::before { opacity: 1; }

  .fmt-icon { font-size: 26px; margin-bottom: 6px; display: block; }
  .fmt-label {
    font-family: 'Bebas Neue', cursive;
    font-size: 20px; letter-spacing: 2px;
    color: var(--text-primary); display: block;
  }
  .fmt-desc {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; color: var(--text-dim);
    display: block; margin-top: 2px; letter-spacing: 1px;
  }
  .fmt-btn.active .fmt-label { color: var(--green-neon); text-shadow: 0 0 12px rgba(78,255,94,0.5); }

  .quality-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .quality-chip {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; padding: 5px 12px;
    border-radius: 20px; cursor: pointer;
    border: 1px solid var(--border);
    color: var(--text-dim); background: transparent;
    transition: all 0.15s; letter-spacing: 1px;
  }
  .quality-chip.active, .quality-chip:hover {
    border-color: var(--green-bright);
    color: var(--green-bright);
    background: rgba(61,186,74,0.1);
  }
  .quality-chip.best.active {
    border-color: var(--green-neon);
    color: var(--green-neon);
    background: rgba(78,255,94,0.12);
    box-shadow: 0 0 10px rgba(78,255,94,0.15);
  }

  /* Saqlash uslubi dizayni o'zgartirildi */
  .save-options-container {
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: rgba(0,0,0,0.2);
    padding: 14px;
    border-radius: 8px;
    border: 1px solid rgba(30,85,38,0.4);
  }

  .tg-mode-row {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    user-select: none;
  }

  /* Custom Neon Checkbox */
  .tg-checkbox {
    position: relative;
    width: 18px; height: 18px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    background: rgba(0,0,0,0.4);
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .tg-mode-row:hover .tg-checkbox { border-color: var(--green-mid); }
  .tg-mode-row.checked .tg-checkbox {
    border-color: var(--green-neon);
    background: rgba(78,255,94,0.15);
    box-shadow: 0 0 8px rgba(78,255,94,0.3);
  }
  .tg-checkbox::after {
    content: '✓';
    color: var(--green-neon);
    font-size: 12px; font-weight: bold;
    display: none;
  }
  .tg-mode-row.checked .tg-checkbox::after { display: block; }

  .tg-label-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px; color: var(--text-primary);
    letter-spacing: 1px;
  }
  .tg-label-text span { color: #54a9eb; font-weight: bold; } /* Telegram ko'k rangi */

  .path-row { display: flex; gap: 10px; align-items: stretch; transition: opacity 0.3s; }
  .path-row.disabled { opacity: 0.3; pointer-events: none; }

  .path-input {
    flex: 1;
    background: rgba(0,0,0,0.35);
    border: 1.5px solid var(--border);
    border-radius: 7px; padding: 11px 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; color: var(--text-dim);
    outline: none;
    transition: border-color 0.2s;
  }
  .path-input:focus { border-color: var(--green-mid); color: var(--text-primary); }

  .browse-btn {
    background: rgba(61,186,74,0.08);
    border: 1.5px solid var(--border);
    border-radius: 7px; padding: 11px 18px;
    color: var(--text-dim); font-family: 'Rajdhani', sans-serif;
    font-weight: 600; font-size: 13px; letter-spacing: 1px;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .browse-btn:hover {
    border-color: var(--green-mid); color: var(--green-bright);
    background: rgba(61,186,74,0.15);
  }

  .download-btn {
    width: 100%; padding: 18px;
    background: linear-gradient(135deg, #1a6b22 0%, #2a9933 50%, #1a6b22 100%);
    border: 2px solid var(--green-bright);
    border-radius: 9px; cursor: pointer;
    font-family: 'Bebas Neue', cursive;
    font-size: 26px; letter-spacing: 5px; color: #fff;
    position: relative; overflow: hidden;
    transition: all 0.2s;
    box-shadow: 0 4px 30px rgba(42,153,51,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center; gap: 12px;
  }
  .download-btn::before {
    content: '';
    position: absolute; top: -50%; left: -60%; width: 40%; height: 200%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
    transform: skewX(-20deg);
    animation: shimmer 3s infinite;
  }
  @keyframes shimmer {
    0% { left: -60%; } 100% { left: 160%; }
  }
  .download-btn:hover {
    background: linear-gradient(135deg, #1e7d28 0%, #34b840 50%, #1e7d28 100%);
    box-shadow: 0 6px 40px rgba(42,153,51,0.6), 0 0 0 2px rgba(78,255,94,0.3);
    transform: translateY(-1px);
  }
  .download-btn:active { transform: translateY(1px); box-shadow: 0 2px 15px rgba(42,153,51,0.4); }

  .progress-section { display: none; }
  .progress-section.visible { display: block; }
  .progress-track {
    height: 6px; background: rgba(0,0,0,0.5);
    border-radius: 3px; overflow: hidden;
    border: 1px solid var(--border);
  }
  .progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--green-mid), var(--green-neon));
    border-radius: 3px;
    box-shadow: 0 0 10px var(--green-neon);
    transition: width 0.3s ease;
  }
  .progress-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; color: var(--text-dim);
    display: flex; justify-content: space-between;
    margin-bottom: 6px; letter-spacing: 1px;
  }
  .progress-label span:last-child { color: var(--green-bright); }

  .footer {
    border-top: 1px solid rgba(30,85,38,0.4);
    padding: 10px 36px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .footer-stat {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; color: #2d5e33;
    letter-spacing: 2px;
  }
  .footer-stat span { color: var(--green-bright); }

  .platforms {
    display: flex; gap: 16px; overflow: hidden;
    mask-image: linear-gradient(90deg, transparent, black 10%, black 90%, transparent);
  }
  .platforms-inner {
    display: flex; gap: 16px;
    animation: scroll-platforms 12s linear infinite;
    white-space: nowrap;
  }
  @keyframes scroll-platforms {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .plat {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; color: #3a6e40; letter-spacing: 1px;
  }

  .toast {
    position: fixed; bottom: 30px; right: 30px; z-index: 100;
    background: rgba(10,26,14,0.95); border: 1px solid var(--green-bright);
    border-radius: 8px; padding: 14px 20px;
    font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--green-neon);
    box-shadow: 0 0 30px rgba(61,186,74,0.3);
    transform: translateY(80px); opacity: 0;
    transition: all 0.3s ease;
    max-width: 280px; letter-spacing: 1px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
  }

  .scanlines {
    position: fixed; inset: 0; z-index: 5; pointer-events: none;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
    );
  }

  @media (max-width: 680px) {
    .window { width: 100%; }
    .header { padding: 16px; gap: 12px; }
    .header-main { font-size: 24px; }
    .body { padding: 16px; gap: 16px; }
    .fmt-label { font-size: 16px; }
    .fmt-icon { font-size: 20px; }
  }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="scanlines"></div>

<svg class="no-juice-bg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <circle cx="100" cy="100" r="90" fill="none" stroke="#d42020" stroke-width="16"/>
  <line x1="36" y1="164" x2="164" y2="36" stroke="#d42020" stroke-width="16"/>
  <polygon points="65,55 135,55 120,155 80,155" fill="#4a7acc" opacity="0.7"/>
  <rect x="75" y="100" width="50" height="55" fill="#ff6b35" opacity="0.7"/>
  <rect x="88" y="30" width="10" height="70" rx="5" fill="#ff9eb5"/>
</svg>

<div class="window">
  <div class="titlebar">
    <div class="titlebar-dots">
      <div class="dot dot-red"></div>
      <div class="dot dot-yellow"></div>
      <div class="dot dot-green"></div>
    </div>
    <div class="titlebar-name">ihj-downloader.web</div>
    <div class="titlebar-status">
      <div class="status-dot"></div>
      ONLINE
    </div>
  </div>

  <div class="header">
    <svg class="logo-sign" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <circle cx="100" cy="100" r="88" fill="rgba(212,32,32,0.08)" stroke="#d42020" stroke-width="14"/>
      <line x1="37" y1="163" x2="163" y2="37" stroke="#d42020" stroke-width="14"/>
      <polygon points="68,52 132,52 118,152 82,152" fill="#5a8add" opacity="0.9"/>
      <rect x="78" y="98" width="44" height="54" rx="2" fill="#ff6b35" opacity="0.9"/>
      <rect x="88" y="28" width="9" height="68" rx="4.5" fill="#ffaabf"/>
    </svg>

    <div class="header-text">
      <div class="header-main">
        I <span class="hate">HATE</span> <span class="juice">JUICE</span> DOWNLOADER
      </div>
      <div class="header-sub">MULTI-PLATFORM · HIGHEST QUALITY · ZERO JUICE</div>
    </div>
    <div class="version-tag">v2.6.0</div>
  </div>

  <div class="body">
    <div>
      <div class="field-label">⬡ Paste URL / Link</div>
      <div class="url-row">
        <input class="url-input" id="urlInput" type="text"
          placeholder="https://youtube.com/watch?v=... · instagram · pinterest · tiktok ..." />
        <button class="paste-btn" onclick="pasteURL()" title="Paste from clipboard">⎘</button>
      </div>
    </div>

    <div>
      <div class="field-label">⬡ Select Format</div>
      <div class="format-row">
        <button class="fmt-btn active" id="fmt-mp4" onclick="selectFormat('mp4')">
          <span class="fmt-icon">🎬</span>
          <span class="fmt-label">MP4</span>
          <span class="fmt-desc">VIDEO</span>
        </button>
        <button class="fmt-btn" id="fmt-mp3" onclick="selectFormat('mp3')">
          <span class="fmt-icon">🎵</span>
          <span class="fmt-label">MP3</span>
          <span class="fmt-desc">AUDIO</span>
        </button>
        <button class="fmt-btn" id="fmt-png" onclick="selectFormat('png')">
          <span class="fmt-icon">🖼️</span>
          <span class="fmt-label">PNG</span>
          <span class="fmt-desc">IMAGE</span>
        </button>
      </div>
    </div>

    <div>
      <div class="field-label">⬡ Quality</div>
      <div class="quality-row">
        <button class="quality-chip best active" onclick="selectQ(this)">4K / BEST</button>
        <button class="quality-chip" onclick="selectQ(this)">1080p</button>
        <button class="quality-chip" onclick="selectQ(this)">720p</button>
        <button class="quality-chip" onclick="selectQ(this)">480p</button>
        <button class="quality-chip" onclick="selectQ(this)">360p</button>
      </div>
    </div>

    <div class="divider"></div>

    <div>
      <div class="field-label">⬡ Save Options</div>
      <div class="save-options-container">
        
        <div class="tg-mode-row" id="tgModeRow" onclick="toggleTelegramMode()">
          <div class="tg-checkbox"></div>
          <div class="tg-label-text">Send file directly to <span>Telegram Bot</span></div>
        </div>

        <div class="path-row" id="pathRow">
          <input class="path-input" id="savePath" type="text" value="Default Downloads Folder" readonly />
          <button class="browse-btn" onclick="browsePath()">📁 Select Folder</button>
        </div>

      </div>
    </div>

    <div class="progress-section" id="progressSection">
      <div class="progress-label">
        <span id="progressStatus">DOWNLOADING...</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <button class="download-btn" id="downloadBtn" onclick="startDownload()">
      ⬇ DOWNLOAD
    </button>
  </div>

  <div class="footer">
    <div class="footer-stat">DOWNLOADS: <span id="dlCount">0</span></div>
    <div class="platforms">
      <div class="platforms-inner" id="platScroll"></div>
    </div>
    <div class="footer-stat">IHJ © 2026</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // Telegram Web App API-ni ishga tushirish
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand(); // Mini appni to'liq ekranga ochish
  }

  // Tanlangan format va yuklash holati o'zgaruvchilari
  let currentFormat = 'mp4';
  let isTelegramMode = false;

  const plats = ['YOUTUBE','INSTAGRAM','PINTEREST','TIKTOK','TWITTER/X','FACEBOOK','VIMEO','REDDIT','TWITCH','DAILYMOTION','SOUNDCLOUD'];
  const inner = document.getElementById('platScroll');
  const full = [...plats,...plats].map(p=>`<span class="plat">◈ ${p}</span>`).join('');
  inner.innerHTML = full + full;

  function selectFormat(fmt) {
    currentFormat = fmt;
    ['mp4','mp3','png'].forEach(f => document.getElementById('fmt-'+f).classList.remove('active'));
    document.getElementById('fmt-'+fmt).classList.add('active');
  }

  function selectQ(el) {
    document.querySelectorAll('.quality-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
  }

  async function pasteURL() {
    try {
      const text = await navigator.clipboard.readText();
      document.getElementById('urlInput').value = text;
      showToast('✓ URL pasted from clipboard');
    } catch {
      document.getElementById('urlInput').focus();
      showToast('⚠ Please paste manually (Ctrl+V / Long Press)');
    }
  }

  // Telegram rejimini yoqish/o'chirish funksiyasi
  function toggleTelegramMode() {
    isTelegramMode = !isTelegramMode;
    const row = document.getElementById('tgModeRow');
    const pathRow = document.getElementById('pathRow');
    const dlBtn = document.getElementById('downloadBtn');

    if (isTelegramMode) {
      row.classList.add('checked');
      pathRow.classList.add('disabled');
      dlBtn.innerHTML = '✈ SEND TO TELEGRAM';
    } else {
      row.classList.remove('checked');
      pathRow.classList.remove('disabled');
      dlBtn.innerHTML = '⬇ DOWNLOAD';
    }
  }

  // Zamonaviy Brauzer Papka Tanlagichi (File System Access API)
  async function browsePath() {
    if (isTelegramMode) return;
    
    // Brauzer ushbu API-ni qo'llab-quvvatlashini tekshirish (Chrome, Edge, Opera-da ishlaydi)
    if ('showDirectoryPicker' in window) {
      try {
        const dirHandle = await window.showDirectoryPicker();
        document.getElementById('savePath').value = `[Folder]: ${dirHandle.name}`;
        showToast(`✓ selected folder: ${dirHandle.name}`);
      } catch (err) {
        if (err.name !== 'AbortError') {
          showToast('⚠ Permission denied or error picking folder.');
        }
      }
    } else {
      // Safari, Firefox yoki Mobil brauzerlarda alternativ xabar
      showToast('ℹ Mobile/Browser standard: Saved directly to your Downloads folder.');
    }
  }

  let dlCount = parseInt(localStorage.getItem('ihj_dl') || '0');
  document.getElementById('dlCount').textContent = dlCount;

  function startDownload() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) { showToast('⚠ Please paste a URL first!'); return; }

    const sec = document.getElementById('progressSection');
    const fill = document.getElementById('progressFill');
    const pct = document.getElementById('progressPct');
    const status = document.getElementById('progressStatus');

    sec.classList.add('visible');
    let p = 0;
    status.textContent = 'FETCHING FROM SERVER...';

    const interval = setInterval(() => {
      p += Math.random() * 6 + 1;
      if (p >= 100) { 
        p = 100; 
        clearInterval(interval); 
        executeSaveSequence(url); 
      }
      if (p > 20) status.textContent = isTelegramMode ? 'PROCESSING FOR TELEGRAM...' : 'DOWNLOADING FILE...';
      if (p > 80) status.textContent = 'FINALIZING PACKETS...';
      fill.style.width = p + '%';
      pct.textContent = Math.floor(p) + '%';
    }, 80);
  }

  // Haqiqiy Saqlash yoki Botga jo'natish qismi
  function executeSaveSequence(targetUrl) {
    document.getElementById('progressStatus').textContent = '✓ COMPLETE';
    dlCount++;
    localStorage.setItem('ihj_dl', dlCount);
    document.getElementById('dlCount').textContent = dlCount;

    if (isTelegramMode) {
      // 1. TELEGRAM BOT REJIMI:
      // Telegram Mini App ichidan botga ma'lumot yuborish
      if (window.Telegram && tg.initData) {
        const payload = {
          action: "download",
          url: targetUrl,
          format: currentFormat,
          quality: document.querySelector('.quality-chip.active').textContent
        };
        
        // Botga JSON tekst ko'rinishida xabar yuboradi. Bot buni ushlab olib faylni tashlab beradi.
        tg.sendData(JSON.stringify(payload));
        showToast('✈ Command sent! Check your bot chat for the file.');
        tg.close(); // Mini Appni avtomatik yopish
      } else {
        showToast('⚠ Telegram context not found! Open inside Telegram.');
      }
    } else {
      // 2. STANDART BRAUZERDA YUKLAB OLISH REJIMI:
      // Agar haqiqiy backend bo'lsa, bu yerda backend api linki bo'ladi. Hozircha simulyatsiya fayl yuklatamiz.
      triggerBrowserDownload(`ihj_file_${Date.now()}.${currentFormat}`);
    }

    setTimeout(() => {
      document.getElementById('progressSection').classList.remove('visible');
      document.getElementById('progressFill').style.width = '0%';
      document.getElementById('progressPct').textContent = '0%';
    }, 3000);
  }

  // Brauzer orqali yuklab olishni boshlash texnologiyasi
  function triggerBrowserDownload(filename) {
    // Dummy (soxta) kontent yaratamiz, backend ulanganida bu haqiqiy fayl blob'i bo'ladi
    const blob = new Blob(["IHJ Downloader - File Content Simulation"], { type: "application/octet-stream" });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    showToast('✓ File saved to browser Downloads directory!');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3200);
  }
</script>
</body>
</html>
